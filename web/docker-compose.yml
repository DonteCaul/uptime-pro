# Standalone deploy for the Next.js app.
#
# Unlike the legacy docker-compose.yml at the repo root, this is a SINGLE
# service — Postgres lives in Supabase now, and the frontend+backend are
# merged into one Next.js container.
#
# For Coolify: point a new service at the web/ directory and supply the env
# vars below via the project's environment panel. The Traefik labels route
# your domain with TLS.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
        # Pass them as build args (NOT secrets — they're public by design).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Runtime-only secrets (never baked into the bundle).
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_PLACES_KEY: ${GOOGLE_PLACES_KEY}
      DEKUNU_COMPAT: ${DEKUNU_COMPAT:-false}
      DEKUNU_JWT_SECRET: ${DEKUNU_JWT_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    networks:
      - coolify

networks:
  coolify:
    external: true
