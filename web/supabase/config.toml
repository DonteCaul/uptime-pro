# Supabase local config (for `supabase start` / `supabase db reset`).
# The hosted project is the source of truth for production; this config drives
# local development only.
#
# Config reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "pszugpaddnwvbadjqvex"

[api]
enabled = true
port = 54321
# All app tables live in the default `public` schema — no custom schema needed.
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[auth]
enabled = true
site_url = "https://next.uptime.pro"
additional_redirect_urls = ["http://localhost:3000/auth/callback", "https://next.uptime.pro/auth/callback"]
jwt_expiry = 2592000   # 30 days, matching the old app
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = false
