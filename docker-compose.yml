services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dekunu
      POSTGRES_USER: dekunu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dekunu -d dekunu"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - coolify

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://dekunu:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dekunu
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string}
      UPLOAD_DIR: /app/uploads
      GOOGLE_PLACES_KEY: ${GOOGLE_PLACES_KEY:-}
      DEKUNU_COMPAT: ${DEKUNU_COMPAT:-false}
    volumes:
      - uploads_data:/app/uploads
    command: sh -c "node src/db/migrate.js && node src/app.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - coolify

  frontend:
    build:
      context: ./frontend
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-http.entrypoints=http"
      - "traefik.http.routers.frontend-http.rule=Host(`uptime.pro`)"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https"
      - "traefik.http.routers.frontend-https.entrypoints=https"
      - "traefik.http.routers.frontend-https.rule=Host(`uptime.pro`)"
      - "traefik.http.routers.frontend-https.tls=true"
      - "traefik.http.routers.frontend-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  coolify:
    external: true

volumes:
  postgres_data:
  uploads_data:
