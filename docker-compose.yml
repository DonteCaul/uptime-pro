services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uptime}
      POSTGRES_USER: ${POSTGRES_USER:-uptime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uptime} -d ${POSTGRES_DB:-uptime}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - coolify

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-uptime}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-uptime}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      UPLOAD_DIR: /app/uploads
      GOOGLE_PLACES_KEY: ${GOOGLE_PLACES_KEY:-}
      DEKUNU_COMPAT: ${DEKUNU_COMPAT:-false}
    volumes:
      - uploads_data:/app/uploads
    command: sh -c "node src/db/migrate.js && node src/app.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - coolify

  frontend:
    build:
      context: ./frontend
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  postgres_data_v2:
  uploads_data:
