services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dekunu
      POSTGRES_USER: dekunu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dekunu -d dekunu"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./dekunu-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://dekunu:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dekunu
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string}
      UPLOAD_DIR: /app/uploads
      GOOGLE_PLACES_KEY: ${GOOGLE_PLACES_KEY:-}
      DEKUNU_COMPAT: ${DEKUNU_COMPAT:-false}
    volumes:
      - uploads_data:/app/uploads
    # Run migrations then start the server
    command: >
      sh -c "node src/db/migrate.js && node src/app.js"

  frontend:
    build:
      context: ./dekunu-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-80}:80"

volumes:
  postgres_data:
  uploads_data:
